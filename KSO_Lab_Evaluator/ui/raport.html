<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KSO Lab Evaluator - Raport Vendor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #0f172a; }
        .card { background-color: white; border-radius: 1rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); padding: 2rem; border: 1px solid #e2e8f0; }
        .metric-box { background-color: #f8fafc; border-radius: 0.5rem; padding: 1rem; border: 1px solid #f1f5f9; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-7xl mx-auto space-y-6">
        
        <header class="flex justify-between items-center mb-8">
            <div>
                <a href="dashboard.html" class="text-indigo-600 hover:text-indigo-800 font-semibold text-sm mb-2 inline-block">&larr; Kembali ke Dashboard</a>
                <h1 class="text-3xl font-extrabold text-slate-800">Raport Kinerja Vendor KSO</h1>
            </div>
        </header>

        <div id="raport-container" class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <p class="text-slate-500">Memuat raport vendor...</p>
        </div>

    </div>

    <script>
        async function fetchRaports() {
            try {
                const response = await fetch('../data/raport_state.json?t=' + new Date().getTime());
                if (!response.ok) return;
                const data = await response.json();

                const container = document.getElementById('raport-container');
                let html = '';

                for (const [vendor, rap] of Object.entries(data)) {
                    let gradeColor = 'text-slate-800';
                    if (rap.grade === 'A') gradeColor = 'text-green-600';
                    else if (rap.grade === 'B') gradeColor = 'text-blue-600';
                    else if (rap.grade === 'C') gradeColor = 'text-yellow-600';
                    else if (rap.grade === 'D') gradeColor = 'text-orange-600';
                    else if (rap.grade === 'E') gradeColor = 'text-red-600';

                    let statusClass = 'bg-slate-100 text-slate-800';
                    if (rap.status.includes('Aman')) statusClass = 'bg-green-100 text-green-800';
                    else if (rap.status.includes('SP 1')) statusClass = 'bg-yellow-100 text-yellow-800';
                    else if (rap.status.includes('SP 2') || rap.status.includes('Putus Kontrak')) statusClass = 'bg-red-100 text-red-800';

                    html += `
                        <div class="card relative overflow-hidden">
                            ${rap.metrics.anomali_harga ? `<div class="absolute top-0 right-0 bg-red-500 text-white text-xs font-bold px-3 py-1 rounded-bl-lg shadow-md">ANOMALI TARIF TERDETEKSI</div>` : ''}
                            
                            <div class="flex justify-between items-start border-b border-slate-100 pb-4 mb-4">
                                <div>
                                    <h2 class="text-2xl font-bold text-slate-800">${rap.vendor}</h2>
                                    <p class="text-sm text-slate-500">Periode: ${rap.bulan}</p>
                                </div>
                                <div class="text-right">
                                    <div class="text-4xl font-extrabold ${gradeColor}">${rap.grade}</div>
                                    <div class="text-sm font-semibold text-slate-500">Skor: ${rap.score}/100</div>
                                </div>
                            </div>

                            <div class="mb-6">
                                <span class="px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider ${statusClass}">
                                    Rekomendasi: ${rap.status}
                                </span>
                            </div>

                            <h3 class="font-bold text-sm text-slate-800 uppercase tracking-wide mb-3">Detail Pencapaian</h3>
                            <div class="grid grid-cols-2 gap-4 mb-6">
                                <div class="metric-box">
                                    <p class="text-xs text-slate-500 font-semibold mb-1">Target Finansial</p>
                                    <p class="font-bold">${rap.metrics.target_rp}</p>
                                    <p class="text-xs text-slate-500 font-semibold mt-2 border-t border-slate-200 pt-1">Realisasi: <span class="${rap.scores.finansial < 40 ? 'text-red-600' : 'text-green-600'}">${rap.metrics.realisasi_rp} (${rap.metrics.pencapaian_rp})</span></p>
                                </div>
                                <div class="metric-box">
                                    <p class="text-xs text-slate-500 font-semibold mb-1">Target Volume</p>
                                    <p class="font-bold">${rap.metrics.target_vol}</p>
                                    <p class="text-xs text-slate-500 font-semibold mt-2 border-t border-slate-200 pt-1">Realisasi: <span class="${rap.scores.volume < 15 ? 'text-red-600' : 'text-green-600'}">${rap.metrics.realisasi_vol} (${rap.metrics.pencapaian_vol})</span></p>
                                </div>
                            </div>

                            <h3 class="font-bold text-sm text-slate-800 uppercase tracking-wide mb-3">Kepatuhan Kontrak</h3>
                            <div class="bg-slate-50 rounded-lg p-3 border border-slate-200 flex justify-between items-center">
                                <div>
                                    <p class="text-xs text-slate-500">Tarif Kesepakatan: <strong>${rap.metrics.tarif_kontrak}</strong></p>
                                    <p class="text-xs text-slate-500">Tarif Aktual: <strong>${rap.metrics.tarif_aktual}</strong></p>
                                </div>
                                <div>
                                    ${rap.metrics.anomali_harga ? `<span class="bg-red-100 text-red-700 px-2 py-1 rounded text-xs font-bold border border-red-200">MELANGGAR KONTRAK</span>` : `<span class="bg-green-100 text-green-700 px-2 py-1 rounded text-xs font-bold border border-green-200">PATUH</span>`}
                                </div>
                            </div>
                        </div>
                    `;
                }

                container.innerHTML = html;

            } catch (err) {
                console.error("Error fetching raports:", err);
            }
        }

        setInterval(fetchRaports, 3000);
        fetchRaports();
    </script>
</body>
</html>
