<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KSO Lab Evaluator - Dashboard Utama</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .card { background-color: white; border-radius: 0.75rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); padding: 1.5rem; }
        .alarm-critical { background-color: #fef2f2; border-left: 4px solid #ef4444; }
        .alarm-warning { background-color: #fffbeb; border-left: 4px solid #f59e0b; }
        .alarm-info { background-color: #f0f9ff; border-left: 4px solid #3b82f6; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-7xl mx-auto space-y-6">
        
        <!-- Header -->
        <header class="flex justify-between items-center bg-white p-6 rounded-xl shadow-sm border border-slate-200">
            <div>
                <h1 class="text-3xl font-extrabold text-indigo-700">Pusat Kendali Pengadaan: Evaluasi KSO Lab</h1>
                <p class="text-slate-500 mt-1">Sistem deteksi dini anomali kontrak & realisasi vendor.</p>
            </div>
            <div class="text-right">
                <p class="text-sm font-semibold text-slate-500">Update Terakhir</p>
                <p id="last-update" class="text-lg font-bold text-slate-800">Menunggu Sinkronisasi...</p>
                <a href="raport.html" class="mt-2 inline-block bg-indigo-600 text-white px-4 py-2 rounded-md font-semibold text-sm hover:bg-indigo-700 transition">Lihat Raport Lengkap &rarr;</a>
            </div>
        </header>

        <!-- Main Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- Alarms Section -->
            <div class="lg:col-span-2 space-y-4">
                <h2 class="text-xl font-bold text-slate-800 flex items-center">
                    <span class="bg-red-100 text-red-600 p-2 rounded-lg mr-2">🚨</span>
                    Radar Anomali & Peringatan Dini
                </h2>
                <div id="alarms-container" class="space-y-3">
                    <p class="text-slate-500">Memuat data radar...</p>
                </div>
            </div>

            <!-- Overview Section -->
            <div class="space-y-4">
                <h2 class="text-xl font-bold text-slate-800 flex items-center">
                    <span class="bg-green-100 text-green-600 p-2 rounded-lg mr-2">📊</span>
                    Ringkasan Vendor
                </h2>
                <div id="overview-container" class="space-y-3">
                    <p class="text-slate-500">Memuat daftar vendor...</p>
                </div>
            </div>

        </div>
    </div>

    <script>
        async function fetchDashboard() {
            try {
                const response = await fetch('../data/dashboard_state.json?t=' + new Date().getTime());
                if (!response.ok) return;
                const data = await response.json();

                document.getElementById('last-update').innerText = data.last_update;

                // Render Alarms
                const alarmsContainer = document.getElementById('alarms-container');
                if (data.alarms.length === 0) {
                    alarmsContainer.innerHTML = `<div class="card bg-green-50 text-green-700 text-center font-semibold border border-green-200">✅ Semua vendor berjalan normal. Tidak ada anomali.</div>`;
                } else {
                    let alarmsHtml = '';
                    data.alarms.forEach(al => {
                        let cssClass = al.type === 'CRITICAL' ? 'alarm-critical text-red-800' : (al.type === 'WARNING' ? 'alarm-warning text-amber-800' : 'alarm-info text-blue-800');
                        let icon = al.type === 'CRITICAL' ? '🔥' : (al.type === 'WARNING' ? '⚠️' : 'ℹ️');
                        alarmsHtml += `
                            <div class="card ${cssClass} p-4">
                                <h3 class="font-bold text-lg mb-1">${icon} ${al.title}</h3>
                                <p class="text-sm opacity-90">${al.desc}</p>
                            </div>
                        `;
                    });
                    alarmsContainer.innerHTML = alarmsHtml;
                }

                // Render Overview
                const overviewContainer = document.getElementById('overview-container');
                let overviewHtml = '';
                data.vendors_overview.forEach(v => {
                    let gradeColor = 'bg-slate-200';
                    if (v.grade === 'A') gradeColor = 'bg-green-500 text-white';
                    else if (v.grade === 'B') gradeColor = 'bg-blue-500 text-white';
                    else if (v.grade === 'C') gradeColor = 'bg-yellow-500 text-white';
                    else if (v.grade === 'D') gradeColor = 'bg-orange-500 text-white';
                    else if (v.grade === 'E') gradeColor = 'bg-red-500 text-white';

                    overviewHtml += `
                        <div class="card p-4 flex justify-between items-center border border-slate-100">
                            <div>
                                <h4 class="font-bold text-slate-800">${v.vendor}</h4>
                                <p class="text-xs text-slate-500">Realisasi: ${v.realisasi_rp}</p>
                            </div>
                            <div class="flex items-center gap-2">
                                ${v.has_anomaly ? `<span title="Ada Anomali Harga" class="text-xl">⚠️</span>` : ''}
                                <span class="px-3 py-1 rounded-full font-bold text-sm ${gradeColor}">Grade ${v.grade}</span>
                            </div>
                        </div>
                    `;
                });
                overviewContainer.innerHTML = overviewHtml;

            } catch (err) {
                console.error("Error fetching data:", err);
            }
        }

        setInterval(fetchDashboard, 3000);
        fetchDashboard();
    </script>
</body>
</html>
