<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi Vendor - PT. KMU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
    </style>
</head>
<body class="antialiased text-gray-900">
    <div class="min-h-screen py-10 px-4 sm:px-6 lg:px-8">
        <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
            <div class="bg-blue-700 px-8 py-6 text-white flex items-center justify-between">
                <div>
                    <h1 class="text-2xl font-bold">Portal Registrasi Vendor</h1>
                    <p class="text-blue-100 mt-1">Sistem Pengadaan Terintegrasi PT. KMU</p>
                </div>
                <div class="bg-white text-blue-700 font-bold px-4 py-2 rounded-lg shadow-sm">
                    Modul 2
                </div>
            </div>

            <form id="vendorForm" class="p-8 space-y-8">
                <!-- Data Perusahaan -->
                <div>
                    <h2 class="text-xl font-semibold text-gray-800 border-b pb-2 mb-4">Informasi Perusahaan</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Nama Perusahaan (Lengkap)*</label>
                            <input type="text" id="company_name" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500" placeholder="PT. Contoh Sejahtera">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Nama Singkat (Opsional)</label>
                            <input type="text" id="company_name_short" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500" placeholder="Contoh">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Tipe Vendor*</label>
                            <select id="vendor_type" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                                <option value="barang">Penyedia Barang</option>
                                <option value="jasa">Penyedia Jasa</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Kategori Spesifik*</label>
                            <select id="vendor_category" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                                <option value="alkes">Alat Kesehatan</option>
                                <option value="farmasi">Obat / Farmasi</option>
                                <option value="kso_lab">KSO Laboratorium</option>
                                <option value="umum">Umum (ATK, dll)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Nomor Induk Berusaha (NIB/SIUP)*</label>
                            <input type="text" id="business_license_number" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">NPWP*</label>
                            <input type="text" id="tax_id_npwp" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500" placeholder="12.345.678.9-012.000">
                        </div>
                    </div>
                </div>

                <!-- Kontak & Alamat -->
                <div>
                    <h2 class="text-xl font-semibold text-gray-800 border-b pb-2 mb-4">Kontak & Alamat Utama</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Alamat Lengkap*</label>
                            <input type="text" id="office_address_street" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500" placeholder="Jl. Sudirman No. 123">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Kota*</label>
                            <input type="text" id="office_address_city" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Provinsi*</label>
                            <input type="text" id="office_address_province" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Kode Pos*</label>
                            <input type="text" id="office_address_postal_code" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Telepon Kantor*</label>
                            <input type="text" id="phone_main" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Email Perusahaan*</label>
                            <input type="email" id="email_company" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                        </div>
                    </div>
                </div>

                <!-- Kontak PIC -->
                <div>
                    <h2 class="text-xl font-semibold text-gray-800 border-b pb-2 mb-4">Person In Charge (PIC)</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Nama PIC*</label>
                            <input type="text" id="contact_person_name" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Jabatan PIC*</label>
                            <input type="text" id="contact_person_title" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">No HP PIC*</label>
                            <input type="text" id="contact_person_phone" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Email PIC*</label>
                            <input type="email" id="contact_person_email" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                        </div>
                    </div>
                </div>

                <!-- Bank -->
                <div>
                    <h2 class="text-xl font-semibold text-gray-800 border-b pb-2 mb-4">Informasi Rekening Bank</h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Nama Bank*</label>
                            <input type="text" id="bank_name" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Nomor Rekening*</label>
                            <input type="text" id="bank_account_number" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Atas Nama*</label>
                            <input type="text" id="bank_account_holder" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                        </div>
                    </div>
                </div>

                <div class="pt-6 border-t border-gray-200 flex justify-end">
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-8 rounded-lg shadow-md transition-colors">
                        Kirim Pendaftaran Vendor
                    </button>
                </div>
            </form>
            
            <div id="successMessage" class="hidden p-8 text-center">
                <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-green-100 mb-4">
                    <svg class="h-8 w-8 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                    </svg>
                </div>
                <h2 class="text-2xl font-bold text-gray-900 mb-2">Pendaftaran Berhasil!</h2>
                <p class="text-gray-600">Terima kasih telah mendaftar. Data Anda sedang direview oleh tim pengadaan PT. KMU.</p>
                <p class="mt-4 font-mono font-bold bg-gray-100 p-2 rounded inline-block" id="vendorIdDisplay"></p>
                <div class="mt-6">
                    <button onclick="location.reload()" class="text-blue-600 font-medium hover:text-blue-800">Daftarkan Vendor Lain</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('vendorForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const payload = {
                company_name: document.getElementById('company_name').value,
                company_name_short: document.getElementById('company_name_short').value,
                vendor_type: document.getElementById('vendor_type').value,
                vendor_category: document.getElementById('vendor_category').value,
                business_license_number: document.getElementById('business_license_number').value,
                tax_id_npwp: document.getElementById('tax_id_npwp').value,
                phone_main: document.getElementById('phone_main').value,
                email_company: document.getElementById('email_company').value,
                website: '',
                office_address_street: document.getElementById('office_address_street').value,
                office_address_city: document.getElementById('office_address_city').value,
                office_address_province: document.getElementById('office_address_province').value,
                office_address_postal_code: document.getElementById('office_address_postal_code').value,
                bank_name: document.getElementById('bank_name').value,
                bank_account_number: document.getElementById('bank_account_number').value,
                bank_account_holder: document.getElementById('bank_account_holder').value,
                contact_person_name: document.getElementById('contact_person_name').value,
                contact_person_title: document.getElementById('contact_person_title').value,
                contact_person_phone: document.getElementById('contact_person_phone').value,
                contact_person_email: document.getElementById('contact_person_email').value
            };

            try {
                const response = await fetch('http://127.0.0.1:8000/api/vendors/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    document.getElementById('vendorForm').classList.add('hidden');
                    document.getElementById('successMessage').classList.remove('hidden');
                    document.getElementById('vendorIdDisplay').innerText = `ID Anda: ${result.vendor_id}`;
                } else {
                    alert('Gagal: ' + (result.detail || 'Terjadi kesalahan server'));
                }
            } catch (err) {
                alert('Gagal terhubung ke server backend.');
                console.error(err);
            }
        });
    </script>
</body>
</html>
